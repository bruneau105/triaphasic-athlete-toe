<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRIPHASIC">
<meta name="theme-color" content="#080808">
<title>TRIPHASIC — Athlete OS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--border:#2c2c2c;--border2:#383838;
  --acc:#c8ff00;--acc-dim:rgba(200,255,0,0.12);--red:#ff3b30;--red-dim:rgba(255,59,48,0.12);
  --blue:#0a84ff;--blue-dim:rgba(10,132,255,0.12);--orange:#ff9f0a;--orange-dim:rgba(255,159,10,0.12);
  --green:#30d158;--green-dim:rgba(48,209,88,0.12);--purple:#bf5af2;--purple-dim:rgba(191,90,242,0.12);
  --pink:#ff375f;--pink-dim:rgba(255,55,95,0.12);
  --text:#f0f0f0;--muted:#666;--muted2:#444;
  --ff-display:'Bebas Neue',sans-serif;--ff-body:'DM Sans',sans-serif;--ff-mono:'JetBrains Mono',monospace;
  --safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--ff-body);font-size:15px;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}
.topbar{padding:calc(var(--safe-top) + 14px) 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(8,8,8,0.97);backdrop-filter:blur(20px);flex-shrink:0;position:relative;z-index:10}
.topbar-title{font-family:var(--ff-display);font-size:1.5rem;letter-spacing:4px;color:var(--acc)}
.topbar-sub{font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:1.1rem;transition:all 0.15s;flex-shrink:0}
.icon-btn:active{background:var(--s3);transform:scale(0.95)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px;padding-bottom:calc(var(--safe-bottom) + 80px)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,10,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;transition:all 0.15s;gap:3px}
.nav-item:active{opacity:0.6}
.nav-icon{font-size:1.3rem}
.nav-label{font-family:var(--ff-mono);font-size:0.5rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:color 0.15s}
.nav-item.active .nav-label{color:var(--acc)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px var(--acc))}
.block-grid{display:flex;flex-direction:column;gap:12px}
.block-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;display:flex;align-items:center;gap:16px}
.block-card:active{transform:scale(0.98)}
.block-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px}
.block-card[data-block="rts"]{background:linear-gradient(135deg,rgba(255,55,95,0.09) 0%,var(--s1) 60%);border-color:rgba(255,55,95,0.3)}
.block-card[data-block="rts"]::before{background:var(--pink)}
.block-card[data-block="0"]::before{background:var(--blue)}
.block-card[data-block="1"]::before{background:var(--red)}
.block-card[data-block="2"]::before{background:var(--orange)}
.block-card[data-block="3"]::before{background:var(--acc)}
.block-card[data-block="4"]::before{background:var(--purple)}
.block-card[data-block="5"]::before{background:var(--green)}
.block-card.locked{opacity:0.4;pointer-events:none}
.block-num{font-family:var(--ff-display);font-size:2.8rem;line-height:1;color:var(--muted2);width:44px;text-align:center;flex-shrink:0}
.block-info{flex:1}
.block-name{font-family:var(--ff-display);font-size:1.3rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.block-meta{font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.block-progress-wrap{margin-top:8px}
.block-progress{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
.block-progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
.block-arrow{color:var(--muted2);font-size:1.1rem;flex-shrink:0}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.day-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s}
.day-card:active{transform:scale(0.97)}
.day-card.completed{border-color:var(--green)}
.day-card.completed .day-num{color:var(--green)}
.day-num{font-family:var(--ff-display);font-size:2.5rem;color:var(--acc);line-height:1;margin-bottom:6px}
.rts-day .day-num{color:var(--pink)}
.day-title{font-size:0.78rem;font-weight:600;line-height:1.3;margin-bottom:4px}
.day-meta{font-family:var(--ff-mono);font-size:0.58rem;color:var(--muted);letter-spacing:1px}
.week-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.week-tab{flex:1;min-width:44px;padding:10px 4px;background:var(--s1);border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:all 0.15s}
.week-tab.active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
.week-tab.rts-tab.active{background:var(--pink-dim);border-color:var(--pink);color:var(--pink)}
.phase-divider{font-family:var(--ff-mono);font-size:0.56rem;letter-spacing:2.5px;color:var(--pink);text-transform:uppercase;margin:0 0 12px;display:flex;align-items:center;gap:10px}
.phase-divider::after{content:'';flex:1;height:1px;background:rgba(255,55,95,0.25)}
.criteria-box{background:rgba(255,55,95,0.06);border:1px solid rgba(255,55,95,0.25);border-left:3px solid var(--pink);border-radius:0 8px 8px 0;padding:12px 14px;margin-top:4px;grid-column:1/-1}
.criteria-label{font-family:var(--ff-mono);font-size:0.56rem;letter-spacing:2px;color:var(--pink);text-transform:uppercase;margin-bottom:6px}
.criteria-item{font-size:0.75rem;color:#bbb;line-height:1.7;padding-left:14px;position:relative}
.criteria-item::before{content:'›';position:absolute;left:0;color:var(--pink)}
.exercise-list{display:flex;flex-direction:column;gap:10px}
.exercise-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.2s}
.exercise-card.done{border-color:var(--green)}
.exercise-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.ex-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:0.8rem}
.exercise-card.done .ex-check{background:var(--green);border-color:var(--green)}
.ex-info{flex:1}
.ex-name{font-weight:600;font-size:0.9rem;margin-bottom:2px}
.ex-scheme{font-family:var(--ff-mono);font-size:0.65rem;color:var(--acc);letter-spacing:1px}
.ex-scheme.rts{color:var(--pink)}
.ex-note{font-size:0.7rem;color:var(--muted);margin-top:2px;font-style:italic;line-height:1.4}
.ex-warn{font-size:0.7rem;color:var(--red);margin-top:2px}
.at-flag{display:inline-flex;align-items:center;padding:2px 7px;background:var(--pink-dim);border:1px solid rgba(255,55,95,0.3);border-radius:20px;font-family:var(--ff-mono);font-size:0.5rem;letter-spacing:1px;color:var(--pink);margin-left:6px;vertical-align:middle}
.ex-expand{color:var(--muted2);font-size:0.9rem;transition:transform 0.2s}
.ex-expand.open{transform:rotate(180deg)}
.set-tracker{display:none;padding:0 16px 14px;border-top:1px solid var(--border);padding-top:12px}
.set-tracker.open{display:block;animation:fadeIn 0.15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.set-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;background:var(--s2);border-radius:8px;border:1px solid transparent;transition:border-color 0.15s}
.set-row.logged{border-color:var(--green);background:var(--green-dim)}
.set-label{font-family:var(--ff-mono);font-size:0.65rem;color:var(--muted);width:28px;flex-shrink:0}
.set-input{flex:1;background:var(--s3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--ff-mono);font-size:0.8rem;padding:6px 10px;text-align:center;outline:none;-webkit-appearance:none}
.set-input:focus{border-color:var(--acc)}
.set-input::placeholder{color:var(--muted2)}
.set-log-btn{width:32px;height:32px;background:var(--s3);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9rem;transition:all 0.15s;flex-shrink:0}
.set-log-btn:active{transform:scale(0.92)}
.set-row.logged .set-log-btn{background:var(--green);border-color:var(--green)}
.set-add-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;background:none;border:1px dashed var(--border2);border-radius:8px;color:var(--muted);font-family:var(--ff-mono);font-size:0.62rem;letter-spacing:1.5px;cursor:pointer;width:100%;justify-content:center;transition:all 0.15s;margin-top:6px}
.set-add-btn:active{border-color:var(--acc);color:var(--acc)}
.circuit-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--blue-dim);border:1px solid rgba(10,132,255,0.3);border-radius:20px;font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:10px}
.finish-btn{width:100%;padding:16px;background:var(--acc);color:#000;font-family:var(--ff-display);font-size:1.2rem;letter-spacing:3px;border:none;border-radius:12px;cursor:pointer;margin-top:20px;transition:all 0.15s;font-weight:700}
.finish-btn:active{transform:scale(0.98);background:#fff}
.finish-btn.rts{background:var(--pink);color:#fff}
.finish-btn.rts:active{background:#fff;color:var(--pink)}
.edit-mode-banner{display:none;background:var(--orange-dim);border-bottom:1px solid rgba(255,159,10,0.3);padding:8px 18px;font-family:var(--ff-mono);font-size:0.62rem;letter-spacing:2px;color:var(--orange);text-transform:uppercase;text-align:center;flex-shrink:0}
.edit-mode-banner.active{display:block}
.add-ex-btn{display:none;align-items:center;gap:6px;padding:12px 16px;background:var(--acc-dim);border:1px dashed rgba(200,255,0,0.3);border-radius:12px;color:var(--acc);font-family:var(--ff-mono);font-size:0.65rem;letter-spacing:2px;cursor:pointer;width:100%;justify-content:center;transition:all 0.15s;margin-top:10px}
.add-ex-btn:active{background:var(--acc);color:#000}
.delete-ex-btn{display:none;width:28px;height:28px;background:var(--red-dim);border:1px solid rgba(255,59,48,0.3);border-radius:6px;color:var(--red);font-size:0.9rem;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s}
.edit-mode-on .delete-ex-btn{display:flex}
.edit-mode-on .add-ex-btn{display:flex}
.delete-ex-btn:active{background:var(--red);color:#fff}
.video-grid{display:flex;flex-direction:column;gap:10px}
.video-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex}
.video-thumb{width:90px;min-height:80px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;cursor:pointer;position:relative}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.video-info{flex:1;padding:12px;display:flex;flex-direction:column;gap:4px}
.video-title{font-weight:600;font-size:0.85rem;line-height:1.3}
.video-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.video-tag{padding:2px 8px;background:var(--s3);border-radius:20px;font-family:var(--ff-mono);font-size:0.55rem;color:var(--muted);letter-spacing:1px}
.video-url{font-family:var(--ff-mono);font-size:0.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-actions{display:flex;flex-direction:column;gap:6px;padding:10px;justify-content:center}
.vid-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9rem;border:1px solid var(--border);background:var(--s2);transition:all 0.15s}
.vid-btn:active{transform:scale(0.92)}
.vid-btn.open{background:var(--acc-dim);border-color:rgba(200,255,0,0.3)}
.vid-btn.del{background:var(--red-dim);border-color:rgba(255,59,48,0.3)}
.add-video-form{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.form-label{font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;margin-top:12px}
.form-label:first-child{margin-top:0}
.form-input,.form-select,.form-textarea{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--ff-body);font-size:0.88rem;padding:10px 14px;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--acc)}
.form-textarea{resize:vertical;min-height:70px}
.btn-full{width:100%;padding:13px;border-radius:10px;font-family:var(--ff-display);font-size:1.1rem;letter-spacing:3px;border:none;cursor:pointer;transition:all 0.15s;margin-top:14px}
.btn-acc{background:var(--acc);color:#000}
.btn-acc:active{background:#fff;transform:scale(0.98)}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border2);font-family:var(--ff-mono);font-size:0.7rem;letter-spacing:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:430px;margin:0 auto;padding:20px 18px calc(var(--safe-bottom) + 24px);animation:slideModal 0.25s ease;max-height:85vh;overflow-y:auto}
@keyframes slideModal{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:var(--ff-display);font-size:1.4rem;letter-spacing:3px;margin-bottom:16px}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-text{font-family:var(--ff-mono);font-size:0.7rem;letter-spacing:2px;line-height:1.8}
.toast{position:fixed;top:calc(var(--safe-top) + 70px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-family:var(--ff-mono);font-size:0.7rem;letter-spacing:2px;font-weight:600;z-index:600;opacity:0;transition:all 0.3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);font-family:var(--ff-mono);font-size:0.65rem;letter-spacing:2px;cursor:pointer;padding:6px 0}
.back-btn:active{color:var(--text)}
.coach-tip{background:var(--acc-dim);border:1px solid rgba(200,255,0,0.15);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0}
.coach-tip p{font-size:0.8rem;color:#ccc;line-height:1.5}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="screen active" id="screen-blocks">
  <div class="topbar">
    <div><div class="topbar-title">TRIPHASIC</div><div class="topbar-sub">Athlete OS</div></div>
    <div class="icon-btn" onclick="toggleEditMode()" id="edit-toggle-btn">✏️</div>
  </div>
  <div class="edit-mode-banner" id="edit-banner">✏️ EDIT MODE — tap exercises to delete or add new ones</div>
  <div class="scroll">
    <div style="font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;">Select Block</div>
    <div class="block-grid" id="block-grid"></div>
  </div>
</div>

<div class="screen" id="screen-days">
  <div class="topbar">
    <div class="back-btn" onclick="goBack('blocks')">← BLOCKS</div>
    <div style="text-align:right">
      <div class="topbar-title" id="days-block-title">BLOCK 0</div>
      <div class="topbar-sub" id="days-block-sub">PREP BLOCK</div>
    </div>
  </div>
  <div class="scroll">
    <div class="week-tabs" id="week-tabs"></div>
    <div id="phase-label-container"></div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>

<div class="screen" id="screen-workout">
  <div class="topbar">
    <div class="back-btn" onclick="goBack('days')">← DAYS</div>
    <div id="edit-toggle-workout" class="icon-btn" onclick="toggleEditModeWorkout()">✏️</div>
  </div>
  <div class="edit-mode-banner" id="edit-banner-workout"></div>
  <div class="scroll" id="workout-scroll"></div>
</div>

<div class="screen" id="screen-library">
  <div class="topbar">
    <div><div class="topbar-title">LIBRARY</div><div class="topbar-sub">Exercise Videos</div></div>
    <div class="icon-btn" onclick="openAddVideo()">＋</div>
  </div>
  <div class="scroll">
    <div class="add-video-form" id="add-video-form" style="display:none">
      <div style="font-family:var(--ff-mono);font-size:0.65rem;letter-spacing:3px;color:var(--acc);text-transform:uppercase;margin-bottom:14px">Save Video</div>
      <label class="form-label">Title / Exercise Name</label>
      <input class="form-input" id="vid-title" placeholder="e.g. Nordic Curl Progression">
      <label class="form-label">Video URL</label>
      <input class="form-input" id="vid-url" placeholder="https://..." type="url">
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="vid-notes" placeholder="Cues, coaching notes..."></textarea>
      <label class="form-label">Tags (comma-separated)</label>
      <input class="form-input" id="vid-tags" placeholder="e.g. hamstring, eccentric, sprint">
      <button class="btn-full btn-acc" onclick="saveVideo()">SAVE VIDEO</button>
      <button class="btn-full btn-outline" onclick="cancelAddVideo()" style="margin-top:8px">CANCEL</button>
    </div>
    <div class="video-grid" id="video-grid"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="navTo('blocks')" id="nav-blocks"><div class="nav-icon">🏋️</div><div class="nav-label">Program</div></div>
  <div class="nav-item" onclick="navTo('library')" id="nav-library"><div class="nav-icon">🎬</div><div class="nav-label">Library</div></div>
</div>

<div class="modal-overlay" id="add-ex-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">ADD EXERCISE</div>
    <label class="form-label">Exercise Name</label>
    <input class="form-input" id="new-ex-name" placeholder="e.g. Box Jumps">
    <label class="form-label">Sets × Reps / Scheme</label>
    <input class="form-input" id="new-ex-scheme" placeholder="e.g. 4 × 6 @ 3 sec eccentric">
    <label class="form-label">Number of Sets</label>
    <input class="form-input" id="new-ex-sets" type="number" min="1" max="10" placeholder="e.g. 4">
    <label class="form-label">Notes / Cues (optional)</label>
    <input class="form-input" id="new-ex-notes" placeholder="e.g. Feel the stretch at bottom">
    <label class="form-label">Warning (optional)</label>
    <input class="form-input" id="new-ex-warn" placeholder="e.g. Start light — form first">
    <button class="btn-full btn-acc" onclick="confirmAddExercise()" style="margin-top:16px">ADD TO DAY</button>
    <button class="btn-full btn-outline" onclick="closeModal('add-ex-modal')" style="margin-top:8px">CANCEL</button>
  </div>
</div>

  b4:{days:[{title:'Power/Speed Lower',meta:'Coming soon — Block 4',circuit:false,exercises:[]},{title:'Power/Speed Upper',meta:'Coming soon',circuit:false,exercises:[]},{title:'Speed Day',meta:'Coming soon',circuit:false,exercises:[]},{title:'Recovery',meta:'Coming soon',circuit:false,exercises:[]}]},
  b5:{days:[{title:'Peak Lower',meta:'Coming soon — Block 5',circuit:false,exercises:[]},{title:'Peak Upper',meta:'Coming soon',circuit:false,exercises:[]},{title:'Speed Realization',meta:'Coming soon',circuit:false,exercises:[]},{title:'Active Recovery',meta:'Coming soon',circuit:false,exercises:[]}]},
};

let state=loadState(),currentBlock=0,currentWeek=0,currentDay=0,editMode=false,editModeWorkout=false;

function loadState(){try{const s=JSON.parse(localStorage.getItem('triphasic-v2')||'null');if(s)return s}catch(e){}return{program:JSON.parse(JSON.stringify(BASE_PROGRAM)),logs:{},completed:{},videos:[]}}
function save(){localStorage.setItem('triphasic-v2',JSON.stringify(state))}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active')}
function navTo(id){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('nav-'+id)?.classList.add('active');if(id==='blocks'){buildBlockGrid();showScreen('blocks')}if(id==='library'){renderVideoLibrary();showScreen('library')}}
function goBack(to){if(to==='blocks')navTo('blocks');if(to==='days'){buildDaysScreen(currentBlock);showScreen('days')}}

function buildBlockGrid(){
  const grid=document.getElementById('block-grid');
  grid.innerHTML=BLOCK_META.map((b,i)=>{
    const prog=getBlockProgress(i);
    const isLocked=!b.isRTS&&i>3;
    const numDisplay=b.isRTS?'🩺':(i-1);
    const colorVar=b.color==='acc'?'acc':b.color;
    return `<div class="block-card${isLocked?' locked':''}" data-block="${b.isRTS?'rts':(i-1)}" ${isLocked?'':'onclick="selectBlock('+i+')"'}>
      <div class="block-num" style="${b.isRTS?'font-size:1.6rem;color:var(--pink)':''}">${numDisplay}</div>
      <div class="block-info">
        <div class="block-name" style="color:var(--${colorVar})">${b.name}</div>
        <div class="block-meta">${b.sub} · ${b.weeks} wks</div>
        <div class="block-progress-wrap">
          <div style="font-family:var(--ff-mono);font-size:0.55rem;color:var(--muted);letter-spacing:1px">${prog.done}/${prog.total} sessions</div>
          <div class="block-progress"><div class="block-progress-fill" style="width:${prog.pct}%;background:var(--${colorVar})"></div></div>
        </div>
      </div>
      <div class="block-arrow">${isLocked?'🔒':'›'}</div>
    </div>`;
  }).join('');
}

function getBlockProgress(idx){
  const b=BLOCK_META[idx];
  let done=0,total=0;
  if(b.isRTS){
    for(let w=0;w<6;w++){total+=2;if(state.completed[`brts_w${w}_d0`])done++;if(state.completed[`brts_w${w}_d1`])done++;}
  } else {
    const days=(state.program[b.key]?.days||[]).length;
    total=b.weeks*days;
    for(let w=0;w<b.weeks;w++)for(let d=0;d<days;d++)if(state.completed[`${b.key}_w${w}_d${d}`])done++;
  }
  return{done,total,pct:total?(done/total)*100:0};
}

function selectBlock(idx){currentBlock=idx;currentWeek=0;buildDaysScreen(idx);showScreen('days')}

function buildDaysScreen(idx){
  const b=BLOCK_META[idx];
  document.getElementById('days-block-title').textContent=b.isRTS?'REHAB':('BLOCK '+(idx-1));
  document.getElementById('days-block-sub').textContent=b.name.toUpperCase();
  const phaseC=document.getElementById('phase-label-container');
  phaseC.innerHTML=b.isRTS?`<div class="phase-divider">${RTS_PHASE_LABELS[currentWeek]}</div>`:'';
  const tabs=document.getElementById('week-tabs');
  tabs.innerHTML=Array.from({length:b.weeks},(_,w)=>`<div class="week-tab${b.isRTS?' rts-tab':''}${w===currentWeek?' active':''}" onclick="selectWeek(${w},${idx})">WK${w+1}</div>`).join('');
  const grid=document.getElementById('day-grid');
  if(b.isRTS){
    const[d0,d1]=getRTSDayIndices(currentWeek);
    const days=[state.program.brts.days[d0],state.program.brts.days[d1]];
    grid.innerHTML=days.map((day,ld)=>{
      const key=`brts_w${currentWeek}_d${ld}`;
      const done=state.completed[key];
      return`<div class="day-card rts-day${done?' completed':''}" onclick="openDay(${ld})"><div class="day-num">D${ld+1}</div><div class="day-title">${day.title}</div><div class="day-meta">${day.meta}${done?' · ✓ DONE':''}</div></div>`;
    }).join('');
    const crit=RTS_CRITERIA[currentWeek];
    if(crit)grid.innerHTML+=`<div class="criteria-box"><div class="criteria-label">✓ PHASE ADVANCEMENT CRITERIA — meet ALL before next phase</div>${crit.map(c=>`<div class="criteria-item">${c}</div>`).join('')}</div>`;
  } else {
    const days=state.program[b.key]?.days||[];
    grid.innerHTML=days.map((day,d)=>{
      const key=`${b.key}_w${currentWeek}_d${d}`;
      const done=state.completed[key];
      const lc=Object.keys(state.logs).filter(k=>k.startsWith(key)).length;
      return`<div class="day-card${done?' completed':''}" onclick="openDay(${d})"><div class="day-num">D${d+1}</div><div class="day-title">${day.title}</div><div class="day-meta">${day.meta}${done?' · ✓ DONE':lc?' · IN PROGRESS':''}</div></div>`;
    }).join('');
  }
}

function selectWeek(w,idx){currentWeek=w;buildDaysScreen(idx)}
function openDay(d){currentDay=d;buildWorkoutScreen();showScreen('workout')}

function getActiveDayData(){
  const b=BLOCK_META[currentBlock];
  if(b.isRTS){const[d0,d1]=getRTSDayIndices(currentWeek);return state.program.brts.days[[d0,d1][currentDay]];}
  return state.program[b.key]?.days[currentDay];
}
function getActiveKey(){
  const b=BLOCK_META[currentBlock];
  return b.isRTS?`brts_w${currentWeek}_d${currentDay}`:`${b.key}_w${currentWeek}_d${currentDay}`;
}

function buildWorkoutScreen(){
  const b=BLOCK_META[currentBlock];
  const day=getActiveDayData();
  if(!day)return;
  const scroll=document.getElementById('workout-scroll');
  const banner=document.getElementById('edit-banner-workout');
  banner.textContent='✏️ EDIT MODE — add or remove exercises';
  banner.classList.toggle('active',editModeWorkout);
  scroll.classList.toggle('edit-mode-on',editModeWorkout);
  const blockLabel=b.isRTS?'REHAB':('BLOCK '+(currentBlock-1));
  let html=`<div style="margin-bottom:16px">
    <div style="font-family:var(--ff-mono);font-size:0.58rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:4px">${blockLabel} · WEEK ${currentWeek+1} · DAY ${currentDay+1}</div>
    <div style="font-family:var(--ff-display);font-size:1.8rem;letter-spacing:3px;text-transform:uppercase;line-height:1.1;${b.isRTS?'color:var(--pink)':''}">${day.title}</div>
    <div style="font-family:var(--ff-mono);font-size:0.62rem;color:var(--muted);letter-spacing:2px;margin-top:4px">${day.meta}</div>
  </div>`;
  if(b.isRTS)html+=`<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--pink-dim);border:1px solid rgba(255,55,95,0.3);border-radius:20px;font-family:var(--ff-mono);font-size:0.58rem;letter-spacing:1.5px;color:var(--pink);margin-bottom:12px">🩺 ${RTS_PHASE_LABELS[currentWeek]}</div>`;
  if(day.circuit)html+=`<div class="circuit-badge">🔄 Circuit · ${day.rounds} Rounds</div>`;
  html+=`<div class="exercise-list" id="ex-list">`;
  day.exercises.forEach((ex,i)=>{
    const key=`${getActiveKey()}_ex${i}`;
    const logs=state.logs[key]||[];
    const allLogged=logs.length>=ex.sets&&logs.every(l=>l.logged);
    html+=buildExCard(ex,i,key,logs,allLogged,editModeWorkout,b.isRTS||false);
  });
  html+=`</div><div class="add-ex-btn" onclick="openAddExercise()">＋ ADD EXERCISE</div>`;
  html+=`<button class="finish-btn${b.isRTS?' rts':''}" onclick="finishWorkout()">MARK COMPLETE ✓</button>`;
  scroll.innerHTML=html;
}

function buildExCard(ex,idx,key,logs,allLogged,editMode,isRTS){
  const sets=ex.sets||3;
  let sRows='';
  for(let s=0;s<sets;s++){
    const l=logs[s]||{};
    sRows+=`<div class="set-row${l.logged?' logged':''}" id="${key}_s${s}">
      <div class="set-label">S${s+1}</div>
      <input class="set-input" placeholder="lbs" value="${l.weight||''}" id="${key}_s${s}_w" type="number" inputmode="decimal">
      <input class="set-input" placeholder="reps" value="${l.reps||''}" id="${key}_s${s}_r" type="number" inputmode="numeric">
      <div class="set-log-btn" onclick="logSet('${key}',${s},${idx})">${l.logged?'✓':'→'}</div>
    </div>`;
  }
  const atBadge=ex.at?'<span class="at-flag">AT REQ\'D</span>':'';
  return`<div class="exercise-card${allLogged?' done':''}" id="excard_${idx}">
    <div class="exercise-header" onclick="toggleExercise(${idx})">
      <div class="ex-check">${allLogged?'✓':''}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}${atBadge}</div>
        <div class="ex-scheme${isRTS?' rts':''}">${ex.scheme}</div>
        ${ex.notes?`<div class="ex-note">${ex.notes}</div>`:''}
        ${ex.warn?`<div class="ex-warn">${ex.warn}</div>`:''}
      </div>
      ${editMode?`<div class="delete-ex-btn" onclick="event.stopPropagation();deleteExercise(${idx})">✕</div>`:''}
      <div class="ex-expand" id="exp_${idx}">▾</div>
    </div>
    <div class="set-tracker" id="sets_${idx}">
      ${sRows}
      <div class="set-add-btn" onclick="addSet('${key}',${idx})">＋ ADD SET</div>
    </div>
  </div>`;
}

function toggleExercise(idx){
  const t=document.getElementById('sets_'+idx),e=document.getElementById('exp_'+idx),o=t.classList.contains('open');
  t.classList.toggle('open',!o);e.classList.toggle('open',!o);
}

function logSet(key,setIdx,exIdx){
  const w=document.getElementById(`${key}_s${setIdx}_w`)?.value||'';
  const r=document.getElementById(`${key}_s${setIdx}_r`)?.value||'';
  if(!state.logs[key])state.logs[key]=[];
  state.logs[key][setIdx]={weight:w,reps:r,logged:true};
  save();
  const row=document.getElementById(`${key}_s${setIdx}`);
  if(row){row.classList.add('logged');row.querySelector('.set-log-btn').textContent='✓'}
  const day=getActiveDayData();
  const ex=day?.exercises[exIdx];
  if(ex){const logs=state.logs[key]||[];if(logs.length>=ex.sets&&logs.every(l=>l.logged)){const c=document.getElementById('excard_'+exIdx);if(c){c.classList.add('done');c.querySelector('.ex-check').textContent='✓'}}}
  showToast('Set logged ✓');
}

function addSet(key,exIdx){const day=getActiveDayData();if(!day)return;day.exercises[exIdx].sets=(day.exercises[exIdx].sets||3)+1;save();buildWorkoutScreen();toggleExercise(exIdx)}
function finishWorkout(){state.completed[getActiveKey()]=true;save();showToast('Workout complete! 🔥');setTimeout(()=>goBack('days'),800)}

function toggleEditMode(){editMode=!editMode;document.getElementById('edit-banner').classList.toggle('active',editMode);const b=document.getElementById('edit-toggle-btn');b.style.background=editMode?'rgba(255,159,10,0.2)':'';b.style.borderColor=editMode?'var(--orange)':''}
function toggleEditModeWorkout(){editModeWorkout=!editModeWorkout;const b=document.getElementById('edit-toggle-workout');b.style.background=editModeWorkout?'rgba(255,159,10,0.2)':'';b.style.borderColor=editModeWorkout?'var(--orange)':'';buildWorkoutScreen();if(editModeWorkout)showToast('Edit mode on')}
function deleteExercise(idx){if(!confirm('Remove this exercise?'))return;const day=getActiveDayData();if(!day)return;day.exercises.splice(idx,1);save();buildWorkoutScreen();showToast('Exercise removed')}
function openAddExercise(){['new-ex-name','new-ex-scheme','new-ex-notes','new-ex-warn'].forEach(id=>document.getElementById(id).value='');document.getElementById('new-ex-sets').value='3';document.getElementById('add-ex-modal').classList.add('active')}
function confirmAddExercise(){
  const name=document.getElementById('new-ex-name').value.trim();
  const scheme=document.getElementById('new-ex-scheme').value.trim();
  const sets=parseInt(document.getElementById('new-ex-sets').value)||3;
  const notes=document.getElementById('new-ex-notes').value.trim();
  const warn=document.getElementById('new-ex-warn').value.trim();
  if(!name){alert('Enter an exercise name.');return}
  const day=getActiveDayData();if(!day)return;
  day.exercises.push({name,scheme:scheme||`${sets} × reps`,sets,notes,warn,at:false});
  save();closeModal('add-ex-modal');buildWorkoutScreen();showToast('Exercise added!');
}
function closeModal(id){document.getElementById(id).classList.remove('active')}

function renderVideoLibrary(){
  const grid=document.getElementById('video-grid');
  if(!state.videos.length){grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🎬</div><div class="empty-text">No videos saved yet.<br>Tap + to add a link.</div></div>`;return}
  grid.innerHTML=state.videos.map((v,i)=>`<div class="video-card">
    <div class="video-thumb" onclick="openVideo('${v.url}')">🎬<div class="play-overlay">▶</div></div>
    <div class="video-info"><div class="video-title">${v.title}</div><div class="video-url">${v.url}</div>${v.notes?`<div style="font-size:0.75rem;color:var(--muted);margin-top:2px">${v.notes}</div>`:''}<div class="video-tags">${(v.tags||[]).map(t=>`<span class="video-tag">${t}</span>`).join('')}</div></div>
    <div class="video-actions"><div class="vid-btn open" onclick="openVideo('${v.url}')">🔗</div><div class="vid-btn del" onclick="deleteVideo(${i})">✕</div></div>
  </div>`).join('');
}
function openAddVideo(){document.getElementById('add-video-form').style.display='block';document.getElementById('vid-title').focus()}
function cancelAddVideo(){document.getElementById('add-video-form').style.display='none'}
function saveVideo(){
  const title=document.getElementById('vid-title').value.trim();
  const url=document.getElementById('vid-url').value.trim();
  const notes=document.getElementById('vid-notes').value.trim();
  const tags=document.getElementById('vid-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!title||!url){alert('Title and URL required.');return}
  state.videos.unshift({title,url,notes,tags});save();cancelAddVideo();
  ['vid-title','vid-url','vid-notes','vid-tags'].forEach(id=>document.getElementById(id).value='');
  renderVideoLibrary();showToast('Video saved!');
}
function deleteVideo(idx){if(!confirm('Remove?'))return;state.videos.splice(idx,1);save();renderVideoLibrary()}
function openVideo(url){window.open(url,'_blank')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

buildBlockGrid();
</script>
</body>
</html>
